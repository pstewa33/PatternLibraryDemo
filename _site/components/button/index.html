<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Buttons</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.2.0/dist/css/uswds.min.css">
  </head>
  <body class="usa-content">
    <main class="usa-prose">
      <h1>Buttons</h1>

      <!-- Component content goes here -->
      <h1>Buttons</h1>
<p>A button draws attention to important actions with a large selectable surface.</p>
<h2>Component Preview</h2>
<div class="grid-row grid-gap">
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Primary button</strong></p>
    <button class="usa-button" >
      Primary button
    </button>
  </div>
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Secondary button</strong></p>
    <button class="usa-button usa-button--secondary" >
      Secondary button
    </button>
  </div>
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Accent Cool</strong></p>
    <button class="usa-button usa-button--accent-cool" >
      Accent Cool
    </button>
  </div>
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Accent Warm</strong></p>
    <button class="usa-button usa-button--accent-warm" >
      Accent Warm
    </button>
  </div>
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Outline</strong></p>
    <button class="usa-button usa-button--outline" >
      Outline
    </button>
  </div>
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Big button</strong></p>
    <button class="usa-button usa-button--big" >
      Big button
    </button>
  </div>
  <div class="tablet:grid-col-4 margin-bottom-2">
    <p><strong>Disabled button</strong></p>
    <button class="usa-button" disabled>
      Disabled button
    </button>
  </div>
</div>
    </main>

    <!-- USWDS JS -->
    <script src="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.2.0/dist/js/uswds.min.js"></script>
    <script>
      // Wait until the DOM is ready, then initialize all USWDS components
      document.addEventListener("DOMContentLoaded", function() {
        if (window.Uswds) {
          Uswds.initAll();
        }
      });
    </script>
  </body>
</html>
