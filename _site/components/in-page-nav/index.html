<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>In-page Navigation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.2.0/dist/css/uswds.min.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body class="page-content">
    <div class="navbar">
      <div class="usa-logo" id="basic-logo">
        <a href="/"><em class="usa-logo__text">USWDS Component Library</em></a>
      </div>
      <ul class="nav-links">
        <li><a class="nav-link" href="/library/components/">Component Library</a></li>
        <li><a class="nav-link" href="/library/templates/">Templates</a></li>
      </ul>
    </div>
    <div class="grid-container-widescreen">
      <div class="grid-row grid-gap">
        <aside class="tablet:grid-col-3">
          <ul class="sidebar-nav">
            
              
                <li><a href="/components/button/">Buttons</a></li>
              
            
              
                <li><a href="/library/components/accordion/">Accordion</a></li>
              
            
              
                <li><a href="/components/alert/">Alert</a></li>
              
            
              
                <li><a href="/components/banner/">Banner</a></li>
              
            
              
                <li><a href="/components/breadcrumb/">Breadcrumb</a></li>
              
            
              
                <li><a href="/library/components/card/">Card</a></li>
              
            
              
                <li><a href="/components/footer/">Footer</a></li>
              
            
              
                <li><a href="/components/header/">Header</a></li>
              
            
              
                <li><a href="/components/identifier/">Identifier</a></li>
              
            
              
                <li><a href="/components/in-page-nav/">In-page Navigation</a></li>
              
            
              
                <li><a href="/components/search/">Search</a></li>
              
            
              
                <li><a href="/components/side-navigation/">Search</a></li>
              
            
              
            
          </ul>
        </aside>
        <main class="tablet:grid-col-9">
          <h1>In-page Navigation</h1>
          <!-- Component preview -->
          
            <p style="color:red;">No component path provided</p>
          
        </main>
      </div>
    </div>

    <!-- USWDS JS -->
    <script src="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.2.0/dist/js/uswds.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
      const links = document.querySelectorAll(".nav-link, .sidebar-nav a");
      const path = window.location.pathname;

      links.forEach(link => {
        // Normalize trailing slash
        let href = link.getAttribute("href");
        if (!href.endsWith("/")) href += "/";

        if (path.startsWith(href)) {
          link.classList.add("active");
          link.setAttribute("aria-current", "page");
        }
      });
    });
    </script>
  </body>
</html>
