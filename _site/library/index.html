<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Library Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.2.0/dist/css/uswds.min.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body>
    <div class="library-navbar">
    <div class="usa-logo" id="basic-logo">
    <a href="/"><em class="usa-logo__text">USWDS Component Library</em></a>
    </div>
    <ul class="nav-links">
    <li><a class="nav-link" href="/library/components/">Component Library</a></li>
    <li><a class="nav-link" href="/library/templates/">Templates</a></li>
    </ul>
</div>
    <section class="hero">
  <div class="hero__content">
    <h1 class="hero__title">Pattern Library</h1>
    <p class="hero__description">
      A collection of reusable components, templates, and patterns used to build consistent user interfaces.
    </p>
<p><div class="hero__actions">
<a class="button button--primary" href="/library/components/">
Browse Components
</a></p>
<p><a class="button button--secondary" href="/library/templates/">
View Templates
</a></p>
<p><a class="button button--secondary" href="/prototype/">
Prototype Mini-Site
</a>
</div></p>
  </div>
</section>

    <!-- USWDS JS -->
    <script src="https://cdn.jsdelivr.net/npm/@uswds/uswds@3.2.0/dist/js/uswds.min.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
      const links = document.querySelectorAll(".nav-link, .sidebar-nav a");
      const path = window.location.pathname;

      links.forEach(link => {
        // Normalize trailing slash
        let href = link.getAttribute("href");
        if (!href.endsWith("/")) href += "/";

        if (path.startsWith(href)) {
          link.classList.add("active");
          link.setAttribute("aria-current", "page");
        }
      });
    });
    </script>
  </body>
</html>
